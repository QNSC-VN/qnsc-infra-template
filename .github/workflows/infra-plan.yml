# =============================================================================
# Infrastructure · Plan — dry-run on every PR targeting main. (OpenTofu under the hood.)
# Posts a plan comment per changed workspace directly on the PR.
# =============================================================================
name: Infrastructure · Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "live/**"
      - "modules/**"
      - ".github/workflows/infra-plan.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TOFU_VERSION: "1.9.1"
  AWS_REGION: ap-southeast-1

jobs:
  fmt:
    name: tofu fmt check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.3.0
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/__PRODUCT__-github-infra-plan
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu fmt -check
        run: tofu fmt -check -recursive -diff

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      workspaces: ${{ steps.set.outputs.workspaces }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with: { fetch-depth: 0 }

      - id: set
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^live/' \
            | sed 's|/.*||' \
            | sort -u \
            | grep -v '^live$' \
            | jq -Rc '[.,inputs]' \
            | jq -sc 'add // []')
          MODULES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^modules/' | wc -l)
          if [ "$MODULES_CHANGED" -gt 0 ]; then
            CHANGED='["live/_shared","live/develop","live/prod"]'
          fi
          echo "workspaces=$CHANGED" >> $GITHUB_OUTPUT

  plan:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.workspaces != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.detect-changes.outputs.workspaces) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.3.0
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/__PRODUCT__-github-infra-plan
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: ${{ matrix.workspace }}
        run: tofu init -input=false

      - name: tofu validate
        working-directory: ${{ matrix.workspace }}
        run: tofu validate

      - name: tofu plan
        id: plan
        working-directory: ${{ matrix.workspace }}
        run: tofu plan -input=false -no-color 2>&1 | tee plan.txt
        env:
          TF_VAR_acm_cert_arn:     ${{ secrets.ACM_CERT_ARN }}
          TF_VAR_web_acm_cert_arn: ${{ secrets.WEB_ACM_CERT_ARN }}
          TF_VAR_image_tag:        ${{ vars.DEFAULT_IMAGE_TAG || 'latest' }}
        continue-on-error: true

      - name: Post plan comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3   # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ matrix.workspace }}/plan.txt', 'utf8');
            const workspace = '${{ matrix.workspace }}';
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `### Infrastructure Plan — \`${workspace}\`\n\`\`\`hcl\n${truncated}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
