# =============================================================================
# Infrastructure · Apply — applies after merge to main. (OpenTofu under the hood.)
# Shared → develop → prod (prod requires GitHub Environment approval).
# =============================================================================
name: Infrastructure · Apply

on:
  push:
    branches: [main]
    paths:
      - "live/**"
      - "modules/**"
      - ".github/workflows/infra-apply.yml"

permissions:
  id-token: write
  contents: read

# Serialize applies on the same ref so two quick merges can't race the tofu
# state lock. Never cancel a running apply mid-flight.
concurrency:
  group: infra-apply-${{ github.ref }}
  cancel-in-progress: false

env:
  TOFU_VERSION: "1.9.1"
  AWS_REGION: ap-southeast-1

jobs:
  apply-shared:
    # The template repo keeps the unresolved `__PRODUCT__` placeholder role ARN,
    # so OIDC role assumption can never succeed here. Scaffolded copies have a
    # different repository name and run normally.
    if: github.repository != 'QNSC-VN/qnsc-infra-template'
    runs-on: ubuntu-latest
    environment: shared
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/__PRODUCT__-github-infra-apply
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: live/_shared
        run: tofu init -input=false

      - name: tofu validate
        working-directory: live/_shared
        run: tofu validate

      - name: tofu apply
        working-directory: live/_shared
        run: tofu apply -input=false -auto-approve

  apply-develop:
    needs: apply-shared
    if: github.repository != 'QNSC-VN/qnsc-infra-template'
    runs-on: ubuntu-latest
    environment: develop
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/__PRODUCT__-github-infra-apply
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: live/develop
        run: tofu init -input=false

      - name: tofu validate
        working-directory: live/develop
        run: tofu validate

      - name: tofu apply
        working-directory: live/develop
        run: tofu apply -input=false -auto-approve
        env:
          TF_VAR_acm_cert_arn:     ${{ secrets.ACM_CERT_ARN_DEVELOP }}
          TF_VAR_web_acm_cert_arn: ${{ secrets.WEB_ACM_CERT_ARN_DEVELOP }}
          TF_VAR_image_tag:        ${{ vars.DEFAULT_IMAGE_TAG || 'latest' }}

  apply-prod:
    needs: apply-develop
    if: github.repository != 'QNSC-VN/qnsc-infra-template'
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub Settings
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/__PRODUCT__-github-infra-apply
          aws-region: ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: live/prod
        run: tofu init -input=false

      - name: tofu validate
        working-directory: live/prod
        run: tofu validate

      - name: tofu apply
        working-directory: live/prod
        run: tofu apply -input=false -auto-approve
        env:
          TF_VAR_acm_cert_arn:     ${{ secrets.ACM_CERT_ARN_PROD }}
          TF_VAR_web_acm_cert_arn: ${{ secrets.WEB_ACM_CERT_ARN_PROD }}
          TF_VAR_image_tag:        ${{ vars.PINNED_IMAGE_TAG }}
