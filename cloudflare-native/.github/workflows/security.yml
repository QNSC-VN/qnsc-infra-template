# =============================================================================
# Security — thin caller of the shared reusable suite (qnsc-ci).
#
# The Cloudflare-native archetype has no Dockerfile, so it calls the shared
# workflow with `scan_container: false`: the Trivy container-CVE job is skipped
# while Semgrep (SAST), Gitleaks (secrets) and osv-scanner (dependency CVEs)
# still run source-based. Same security gate as the AWS full-stack products, so
# posture stays uniform across the org.
#
# Replace __PRODUCT__ (init.sh does this) before the first push.
# =============================================================================
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # weekly Monday 04:00 UTC — catch new CVEs between pushes

permissions:
  contents: read
  security-events: write # SARIF upload (no-op on the free plan, lights up after GHAS)

jobs:
  security:
    uses: QNSC-VN/qnsc-ci/.github/workflows/security.yml@v1
    with:
      product: __PRODUCT__
      scan_container: false # no Dockerfile — skip Trivy, keep Semgrep + Gitleaks + osv
      node_version: '22'
    secrets: inherit
